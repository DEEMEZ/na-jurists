# Phase 4 — lint, test, build for law-firm-portal (backend + frontend).
name: Law firm portal CI

on:
  push:
    paths:
      - "law-firm-portal/**"
      - ".github/workflows/law-firm-portal-ci.yml"
  pull_request:
    paths:
      - "law-firm-portal/**"
      - ".github/workflows/law-firm-portal-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: na_jurists_portal_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d na_jurists_portal_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: law-firm-portal/backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/na_jurists_portal_ci?schema=public
      JWT_ACCESS_SECRET: ci-jwt-secret-minimum-32-characters-long
      FRONTEND_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: law-firm-portal/backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Sync Prisma schema
        run: npx prisma db push
      - name: Seed database (test users)
        run: npx prisma db seed
      - name: Typecheck
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: law-firm-portal/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: law-firm-portal/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Build
        run: npm run build
